name: Upload Release Assets

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package Application
        run: |
          # Runs from the root to capture everything, excluding all top-level and nested hidden files
          zip -r Emu68ImagerSupportingFiles-${{ github.event.release.tag_name }}.zip . -x ".*" "*/.*"
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: Emu68ImagerSupportingFiles-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
