name: Periodic Archive of Emu68-Imager (Jekyll)

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch: # Allows manual runs

jobs:
  archive-repo-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to update the release
    steps:
      - name: Checkout Emu68-Imager Documentation Repo
        uses: actions/checkout@v4
        with:
          repository: mja65/Emu68-Imager
          path: source-files

      # 1. Set up Ruby
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # 2. Install Jekyll and the standard GitHub fallback theme
      - name: Install Jekyll & Primer Theme
        run: gem install jekyll bundler jekyll-theme-primer

      # 3. Build the site pointing directly to the docs folder using the default theme
      - name: Build Jekyll Site from Docs Folder
        run: |
          cd source-files
          jekyll build --source docs --destination compiled-site --theme jekyll-theme-primer

      # 4. Zip the compiled directory (contains your converted HTML and pictures)
      - name: Package HTML Documentation
        run: |
          cd source-files/compiled-site
          zip -r ../../Emu68-Imager-Latest-Backup.zip . -x ".*" "*/.*"

      # 5. Upload/Update the zip archive in your dedicated release entry
      - name: Upload Backup to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: html-documentation-backup
          name: "Emu68-Imager Latest HTML Backup"
          body: "This dedicated release entry contains the most recent periodically generated Jekyll HTML documentation."
          files: Emu68-Imager-Latest-Backup.zip
          allowUpdates: true
          makeLatest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
