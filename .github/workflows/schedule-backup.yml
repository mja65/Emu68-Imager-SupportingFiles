name: Periodic Archive of Emu68-Imager (Jekyll)

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  archive-repo-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Emu68-Imager
        uses: actions/checkout@v4
        with:
          path: source-files

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Jekyll
        run: |
          cd source-files
          if [ -f Gemfile ]; then
            bundle install
          else
            gem install jekyll bundler
          fi

      - name: Build Jekyll Site
        run: |
          cd source-files
          if [ -f Gemfile ]; then
            bundle exec jekyll build
          else
            jekyll build
          fi

      - name: Package HTML Documentation
        run: |
          cd source-files/_site
          zip -r ../../Emu68-Imager-Latest-Backup.zip . -x ".*" "*/.*"

      - name: Upload Backup to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: html-documentation-backup
          name: "Emu68-Imager Latest HTML Backup"
          body: "This dedicated release entry contains the most recent periodically generated Jekyll HTML documentation."
          files: Emu68-Imager-Latest-Backup.zip
          allowUpdates: true
          makeLatest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
