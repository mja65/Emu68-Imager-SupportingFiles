name: Periodic Archive of Emu68-Imager (Jekyll)

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch: # Allows manual runs

jobs:
  archive-repo-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to update the release
      pages: read     # Needed to read Pages configuration
    steps:
      - name: Checkout Emu68-Imager Documentation Repo
        uses: actions/checkout@v4
        with:
          repository: mja65/Emu68-Imager
          path: source-files

      # 1. Use GitHub's official Pages configuration setup
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Use GitHub's official Jekyll builder action
      # This builds your site EXACTLY how it looks online, turning .md into .html
      - name: Build Jekyll with GitHub Pages Action
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./source-files
          destination: ./compiled-site

      # 3. Zip the compiled directory
      - name: Package HTML Documentation
        run: |
          cd compiled-site
          zip -r ../Emu68-Imager-Latest-Backup.zip . -x ".*" "*/.*"

      # 4. Upload/Update the zip archive in your dedicated release entry
      - name: Upload Backup to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: html-documentation-backup
          name: "Emu68-Imager Latest HTML Backup"
          body: "This dedicated release entry contains the most recent periodically generated Jekyll HTML documentation."
          files: Emu68-Imager-Latest-Backup.zip
          allowUpdates: true
          makeLatest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
